<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ถึงคนอ้วลที่เค้ารัก</title>

  <style>
    :root {
      --bg-1: #ffd7ba;
      --bg-2: #ffb4a2;
      --bg-3: #ff8fab;
      --card: rgba(255, 255, 255, 0.2);
      --text: #5f0f40;
      --accent: #fff;
      --btn: #ff5d8f;
      --btn-hover: #ff3f7c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.35), transparent 35%),
        radial-gradient(circle at 80% 0%, rgba(255, 255, 255, 0.2), transparent 30%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2) 45%, var(--bg-3));
    }

    .wrap {
      width: min(92vw, 640px);
      padding: 2rem;
      border-radius: 28px;
      text-align: center;
      background: var(--card);
      backdrop-filter: blur(8px);
      box-shadow: 0 18px 45px rgba(95, 15, 64, 0.18);
      animation: rise 900ms ease;
      position: relative;
      z-index: 2;
    }

    .tag {
      margin: 0;
      font-size: 0.95rem;
      letter-spacing: 1px;
      opacity: 0.9;
    }

    h1 {
      margin: 0.8rem 0 0.6rem;
      font-size: clamp(1.8rem, 4.8vw, 3rem);
      line-height: 1.2;
    }

    p {
      margin: 0 auto 1.5rem;
      max-width: 48ch;
      font-size: clamp(1rem, 2.9vw, 1.15rem);
      opacity: 0.95;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 0.85rem 1.6rem;
      color: var(--accent);
      background: var(--btn);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(255, 63, 124, 0.35);
      transition: transform 180ms ease, background 180ms ease;
    }

    button:hover {
      transform: translateY(-2px) scale(1.02);
      background: var(--btn-hover);
    }

    .love-note {
      margin-top: 1rem;
      padding: 0.9rem 1rem;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.45);
      font-weight: 600;
      display: none;
      animation: pop 420ms ease;
    }

    .heart {
      position: fixed;
      bottom: -30px;
      font-size: 20px;
      animation: fly linear forwards;
      pointer-events: none;
      z-index: 1;
    }

    @keyframes fly {
      to {
        transform: translateY(-110vh) rotate(20deg);
        opacity: 0;
      }
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pop {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <p class="tag">FOR MY FAVORITE PERSON</p>
    <h1>รักเธอนะ คนเก่งของเรา</h1>
    <p>
      ขอบคุณที่อยู่ข้างกันในทุกวัน เธอคือรอยยิ้มที่ทำให้วันธรรมดาๆ ของเราพิเศษเสมอ
    </p>
    <button id="loveBtn" type="button">กดเพื่อรับความรัก</button>
    <div id="loveNote" class="love-note">เป็นแฟนกันไปนานๆ นะ เรารักเธอที่สุดเลย</div>
  </main>

  <iframe
    title="ข้างกัน - Three Man Down"
    width="0"
    height="0"
    src="https://www.youtube.com/embed/0xSiBpUdW4E?autoplay=1&loop=1&playlist=0xSiBpUdW4E"
    frameborder="0"
    allow="autoplay"
  ></iframe>

  <script>
    const loveBtn = document.getElementById("loveBtn");
    const loveNote = document.getElementById("loveNote");

    function createHeart() {
      const heart = document.createElement("span");
      heart.className = "heart";
      heart.textContent = "💖";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = 18 + Math.random() * 28 + "px";
      heart.style.animationDuration = 2.8 + Math.random() * 2.2 + "s";
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 5200);
    }

    function showerHearts(total = 45) {
      for (let i = 0; i < total; i++) {
        setTimeout(createHeart, i * 70);
      }
    }

    loveBtn.addEventListener("click", () => {
      loveNote.style.display = "block";
      showerHearts();
    });
  </script>
</body>
</html>
